version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: careerbridge
      POSTGRES_USER: careerbridge_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - careerbridge_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careerbridge_network
    restart: unless-stopped

  # CareerBridge Main Application
  careerbridge:
    build:
      context: ./careerbridge
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/careerbridge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - JOB_CRAWLER_BASE_URL=http://jobcrawler:8000
      - JOB_CRAWLER_API_KEY=${JOB_CRAWLER_API_KEY}
      - RESUME_MATCHER_BASE_URL=http://resumematcher:8002
      - RESUME_MATCHER_API_KEY=${RESUME_MATCHER_API_KEY}
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes:
      - ./careerbridge/media:/app/media
      - ./careerbridge/logs:/app/logs

  celery_worker:
    build:
      context: ./careerbridge
      dockerfile: Dockerfile
    command: celery -A careerbridge worker -l info
    environment:
      - DATABASE_URL=postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/careerbridge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - postgres
      - redis
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes:
      - ./careerbridge/media:/app/media
      - ./careerbridge/logs:/app/logs

  celery_beat:
    build:
      context: ./careerbridge
      dockerfile: Dockerfile
    command: celery -A careerbridge beat -l info
    environment:
      - DATABASE_URL=postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/careerbridge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - postgres
      - redis
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes:
      - ./careerbridge/media:/app/media
      - ./careerbridge/logs:/app/logs

  # JobCrawler Service
  jobcrawler:
    build:
      context: ./JobCrawler
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/jobcrawler
      - REDIS_URL=redis://redis:6379/1
      - API_KEY=${JOB_CRAWLER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - careerbridge_network
    restart: unless-stopped

  # ResumeMatcher Service
  resumematcher:
    build:
      context: ./ResumeMatcher
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/resumematcher
      - REDIS_URL=redis://redis:6379/2
      - API_KEY=${RESUME_MATCHER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - careerbridge_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - careerbridge
      - jobcrawler
      - resumematcher
    networks:
      - careerbridge_network
    restart: unless-stopped

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - careerbridge_network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - careerbridge_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  careerbridge_network:
    driver: bridge 
