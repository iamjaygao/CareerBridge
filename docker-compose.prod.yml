# ── Shared environment anchors ────────────────────────────────────────────────
# All Django services (app + celery) share these vars. Override per-service below.
x-django-env: &django-env
  DATABASE_URL: "postgresql://careerbridge_user:${POSTGRES_PASSWORD}@postgres:5432/careerbridge"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "${SECRET_KEY}"
  DEBUG: "${DEBUG:-False}"
  ALLOWED_HOSTS: "${ALLOWED_HOSTS}"
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
  CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS}"
  CELERY_BROKER_URL: "redis://redis:6379/3"
  CELERY_RESULT_BACKEND: "redis://redis:6379/4"
  SECURE_SSL_REDIRECT: "${SECURE_SSL_REDIRECT:-False}"
  SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-False}"
  CSRF_COOKIE_SECURE: "${CSRF_COOKIE_SECURE:-False}"

x-django-app-env: &django-app-env
  <<: *django-env
  JOB_CRAWLER_BASE_URL: "${JOB_CRAWLER_BASE_URL}"
  JOB_CRAWLER_API_KEY: "${JOB_CRAWLER_API_KEY}"
  RESUME_MATCHER_BASE_URL: "${RESUME_MATCHER_BASE_URL}"
  RESUME_MATCHER_API_KEY: "${RESUME_MATCHER_API_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
  STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
  EMAIL_HOST_USER: "${EMAIL_HOST_USER}"
  EMAIL_HOST_PASSWORD: "${EMAIL_HOST_PASSWORD}"

x-django-volumes: &django-volumes
  - ./gateai/media:/app/media
  - ./gateai/logs:/app/logs

x-db-depends: &db-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15.7
    environment:
      POSTGRES_DB: careerbridge
      POSTGRES_USER: careerbridge_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - careerbridge_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerbridge_user -d careerbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careerbridge_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GateAI Application ───────────────────────────────────────────────────────
  careerbridge:
    build:
      context: .
      dockerfile: gateai/Dockerfile
    image: careerbridge-app          # named so celery services can reuse it
    environment:
      <<: *django-app-env
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-3}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
    depends_on: *db-depends
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes:
      - ./gateai/media:/app/media
      - ./gateai/logs:/app/logs
      - ./gateai/staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  # Reuses the image built by careerbridge — no separate build step.
  celery_worker:
    image: careerbridge-app
    command: celery -A gateai worker -l info --concurrency=${CELERY_CONCURRENCY:-4}
    environment:
      <<: *django-app-env
    depends_on:
      <<: *db-depends
      careerbridge:
        condition: service_healthy
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes: *django-volumes

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  celery_beat:
    image: careerbridge-app
    command: celery -A gateai beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *django-env
    depends_on:
      <<: *db-depends
      careerbridge:
        condition: service_healthy
    networks:
      - careerbridge_network
    restart: unless-stopped
    volumes: *django-volumes

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      careerbridge:
        condition: service_healthy
    networks:
      - careerbridge_network
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - careerbridge_network
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - careerbridge_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  static_volume:

networks:
  careerbridge_network:
    driver: bridge
