user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size  20M;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # API: 60 req/min per IP (burst of 20 queued without error)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Login endpoint: 10 req/min to slow brute-force
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    upstream django {
        server careerbridge:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header X-Frame-Options          "DENY"                             always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy       "geolocation=(), microphone=()"    always;

        # Uncomment after enabling HTTPS:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # return 301 https://$host$request_uri;

        # ── Auth endpoints (stricter rate limit) ──────────────────────────────
        location ~ ^/api/v1/users/(login|register|token)/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Django API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Kernel Console (superadmin only, proxied via /api/v1/kernel/) ─────
        location /kernel/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Django Admin ──────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Swagger / Redoc ───────────────────────────────────────────────────
        location /swagger/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /redoc/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── React Static Assets (before generic /static/) ─────────────────────
        location /static/js/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /static/css/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /static/media/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Django Static Files (collectstatic output) ────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Django Media Files ────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://django;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── React SPA fallback ────────────────────────────────────────────────
        location / {
            root  /app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS — uncomment and configure when SSL certs are ready ─────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     # Copy location blocks from above
    # }
}
