user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size  20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    upstream django {
        server careerbridge:8000;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS in production
        # Uncomment when SSL certificates are in place
        # return 301 https://$host$request_uri;

        # --- Django API ---
        # Django Swagger/Redoc
        location /swagger/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /redoc/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # --- Django Admin ---
        location /admin/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- React Static Assets (must come before the generic /static/ block) ---
        location /static/js/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /static/css/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /static/media/ {
            root  /app/frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Django Static Files (collectstatic output) ---
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Django Media Files ---
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # --- WebSocket support ---
        location /ws/ {
            proxy_pass         http://django;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # --- React Frontend (SPA fallback) ---
        location / {
            root  /app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # HTTPS server — uncomment and configure when SSL certs are ready
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /api/ { ... }
    #     location /static/ { ... }
    #     location / { ... }
    # }
}
